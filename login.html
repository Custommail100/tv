<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Match CMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
          --primary: #667eea;
          --secondary: #764ba2;
        }

        body {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
          background: white;
          border-radius: 15px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
          overflow: hidden;
          max-width: 500px;
          width: 90%;
        }

        .login-header {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          padding: 40px 30px;
          text-align: center;
        }

        .login-header h1 {
          font-size: 2rem;
          font-weight: 700;
          margin-bottom: 10px;
        }

        .login-header p {
          margin: 0;
          opacity: 0.9;
        }

        .login-body {
          padding: 40px 30px;
        }

        .form-group {
          margin-bottom: 20px;
        }

        .form-label {
          font-weight: 600;
          color: #333;
          margin-bottom: 8px;
        }

        .form-control {
          border: 1px solid #ddd;
          border-radius: 8px;
          padding: 12px 15px;
          font-size: 0.95rem;
        }

        .form-control:focus {
          border-color: #667eea;
          box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-login {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          padding: 12px 30px;
          border-radius: 8px;
          font-weight: 600;
          font-size: 1rem;
          width: 100%;
          transition: all 0.3s ease;
          cursor: pointer;
        }

        .btn-login:hover {
          transform: translateY(-2px);
          box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
          opacity: 0.7;
          cursor: not-allowed;
        }

        .help-text {
          font-size: 0.85rem;
          color: #666;
          margin-top: 8px;
        }

        .info-box {
          background: #f0f4ff;
          border-left: 4px solid #667eea;
          padding: 15px;
          border-radius: 5px;
          margin-bottom: 20px;
        }

        .info-box strong {
          color: #667eea;
        }

        .toggle-token {
          cursor: pointer;
        }

        .input-group-text {
          background-color: transparent;
          border: 1px solid #ddd;
          cursor: pointer;
        }

        .input-group-text:hover {
          background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-tv"></i> Sports CMS</h1>
            <p>Admin Dashboard</p>
        </div>
        <div class="login-body">
            <div class="info-box">
                <strong>Get Started:</strong>
                <p class="mb-0 mt-2 small">Configure your GitHub repository to get started with the Sports Match CMS.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">GitHub Owner</label>
                    <input type="text" class="form-control" id="owner" placeholder="e.g., Custommail100" required>
                    <div class="help-text">Your GitHub username or organization name</div>
                </div>

                <div class="form-group">
                    <label class="form-label">GitHub Repository</label>
                    <input type="text" class="form-control" id="repo" placeholder="e.g., tv" required>
                    <div class="help-text">Repository name where match.json is stored</div>
                </div>

                <div class="form-group">
                    <label class="form-label">GitHub Branch</label>
                    <input type="text" class="form-control" id="branch" placeholder="main" value="main">
                    <div class="help-text">Default branch name</div>
                </div>

                <div class="form-group">
                    <label class="form-label">File Path</label>
                    <input type="text" class="form-control" id="filePath" placeholder="match.json" value="match.json">
                    <div class="help-text">Path to match.json in your repository</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Personal Access Token</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="token" placeholder="ghp_xxxxxxxxxxxxx" required>
                        <span class="input-group-text toggle-token" id="toggleToken">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="help-text">
                        <a href="https://github.com/settings/tokens" target="_blank">Create a token</a> with repo scope
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>
    </div>

    <script>
        // Toggle Token Visibility
        document.getElementById('toggleToken').addEventListener('click', () => {
            const input = document.getElementById('token');
            const icon = document.querySelector('#toggleToken i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const config = {
                owner: document.getElementById('owner').value.trim(),
                repo: document.getElementById('repo').value.trim(),
                branch: document.getElementById('branch').value.trim(),
                filePath: document.getElementById('filePath').value.trim(),
                token: document.getElementById('token').value.trim(),
            };

            if (!config.owner || !config.repo || !config.token) {
                alert('Please fill all required fields');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Testing...';

            try {
                // Test connection
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                    },
                });

                if (!response.ok) {
                    throw new Error('Invalid token or connection failed');
                }

                // Save config
                localStorage.setItem('github_owner', config.owner);
                localStorage.setItem('github_repo', config.repo);
                localStorage.setItem('github_branch', config.branch);
                localStorage.setItem('file_path', config.filePath);
                localStorage.setItem('github_token', config.token);

                // Redirect to dashboard
                window.location.href = 'index.html';
            } catch (error) {
                alert('Connection failed: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
    </script>
</body>
</html>
