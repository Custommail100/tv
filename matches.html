<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Match CMS - Matches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 class="mb-0">
                    <i class="fas fa-tv"></i> Sports CMS
                </h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="matches.html">
                        <i class="fas fa-futbol"></i> Matches
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="leagues.html">
                        <i class="fas fa-trophy"></i> Leagues
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="categories.html">
                        <i class="fas fa-list"></i> Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="settings.html">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content" id="main-content">
            <!-- Top Navigation -->
            <nav class="navbar navbar-expand-lg navbar-dark top-navbar">
                <div class="container-fluid">
                    <button class="btn btn-dark me-3" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <span class="navbar-brand mb-0">Matches</span>
                    <div class="ms-auto d-flex align-items-center gap-3">
                        <button class="btn btn-dark" id="toggleDarkMode" title="Toggle Dark Mode">
                            <i class="fas fa-moon"></i>
                        </button>
                        <div class="dropdown">
                            <button class="btn btn-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="settings.html">Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="page-content">
                <div class="container-fluid">
                    <!-- Header -->
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h1 class="page-title">Matches Management</h1>
                                    <p class="text-muted">Create, edit, and manage sports matches.</p>
                                </div>
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#matchModal">
                                    <i class="fas fa-plus"></i> Add Match
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Filters and Search -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search matches...">
                        </div>
                        <div class="col-md-3">
                            <select class="form-control" id="categoryFilter">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-control" id="leagueFilter">
                                <option value="">All Leagues</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-control" id="statusFilter">
                                <option value="">All Status</option>
                                <option value="upcoming">Upcoming</option>
                                <option value="live">Live</option>
                                <option value="finished">Finished</option>
                            </select>
                        </div>
                    </div>

                    <!-- Matches List -->
                    <div class="row">
                        <div class="col-12">
                            <div id="matchesContainer" class="matches-grid">
                                <div class="text-center text-muted py-5">
                                    <i class="fas fa-spinner fa-spin"></i> Loading matches...
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div class="row mt-4">
                        <div class="col-12">
                            <nav aria-label="Page navigation">
                                <ul class="pagination justify-content-center" id="paginationContainer">
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Match Modal -->
    <div class="modal fade" id="matchModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="matchModalTitle">Add Match</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="matchForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select class="form-control" id="matchCategory" required>
                                    <option value="">Select Category</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">League</label>
                                <select class="form-control" id="matchLeague" required>
                                    <option value="">Select League</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Match Title</label>
                            <input type="text" class="form-control" id="matchTitle" placeholder="e.g., Semi Final" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Team A Name</label>
                                <input type="text" class="form-control" id="teamAName" placeholder="Team A" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Team A Flag URL</label>
                                <input type="text" class="form-control" id="teamAFlag" placeholder="Flag URL">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Team B Name</label>
                                <input type="text" class="form-control" id="teamBName" placeholder="Team B" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Team B Flag URL</label>
                                <input type="text" class="form-control" id="teamBFlag" placeholder="Flag URL">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="startTime" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Finish Time</label>
                                <input type="datetime-local" class="form-control" id="finishTime" required>
                            </div>
                        </div>

                        <!-- Stream Sources -->
                        <div class="mb-3">
                            <label class="form-label">Stream Sources</label>
                            <div id="sourcesContainer"></div>
                            <button type="button" class="btn btn-sm btn-secondary" id="addSourceBtn">
                                <i class="fas fa-plus"></i> Add Source
                            </button>
                        </div>

                        <input type="hidden" id="matchId">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveMatchBtn">Save Match</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmMessage">
                    Are you sure?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/matches.js"></script>
</body>
</html>
